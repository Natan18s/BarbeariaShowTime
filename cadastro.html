<!-- Define HTML5 -->
<!DOCTYPE html>

<!-- Idioma -->
<html lang="pt-BR">

<head>

  <!-- Caracteres especiais -->
  <meta charset="UTF-8">

  <!-- Responsividade -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- Título -->
  <title>Cadastro | BarberShowTime</title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/cadastro.css"
  >

</head>

<body>

  <!-- Container principal -->
  <div class="container">

    <!-- Caixa do formulário -->
    <div class="form-box">

      <!-- Título -->
      <h1>Crie sua conta</h1>

      <!-- Formulário -->
      <form>

        <!-- Nome -->
        <div class="input-group">

          <label for="nome">
            Nome Completo
          </label>

          <input
            type="text"
            id="nome"
            placeholder="Digite seu nome"
          >

        </div>

        <!-- Telefone -->
        <div class="input-group">

          <label for="telefone">
            Telefone
          </label>

          <input
            type="tel"
            id="telefone"
            placeholder="(21) 99999-9999"
          >

        </div>

        <!-- Idade -->
        <div class="input-group">

          <label for="idade">
            Idade
          </label>

          <input
            type="number"
            id="idade"
            placeholder="Sua idade"
          >

        </div>

        <!-- Tipo cabelo -->
        <div class="input-group">

          <label for="cabelo">
            Tipo de cabelo
          </label>

          <input
            type="text"
            id="cabelo"
            placeholder="Ex: Cacheado"
          >

        </div>

        <!-- Email -->
        <div class="input-group">

          <label for="email">
            Email
          </label>

          <input
            type="email"
            id="email"
            placeholder="Digite seu email"
          >

        </div>

        <!-- Senha -->
        <div class="input-group">

          <label for="senha">
            Senha
          </label>

          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
          >

        </div>

        <!-- Botão -->
        <button type="submit">
          Cadastrar
        </button>

      </form>

      <!-- Link login -->
      <p class="login-link">

        Já possui conta?

        <a href="login.html">
          Fazer Login
        </a>

      </p>

    </div>

  </div>

  <!-- JavaScript -->
  <script src="assets/js/cadastro.js"></script>

</body>

</html>
