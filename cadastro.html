<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cadastro | BarberShowTime</title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/cadastro.css"
  >

</head>

<body>

  <!-- Container principal -->
  <div class="container">

    <!-- Caixa formulário -->
    <div class="form-box">

      <!-- Título -->
      <h1>Crie sua conta</h1>

      <!-- Formulário -->
      <form id="formCadastro">

        <!-- Nome -->
        <div class="input-group">

          <label for="nome">
            Nome Completo
          </label>

          <input
            type="text"
            id="nome"
            placeholder="Digite seu nome completo"
            required
          >

        </div>

        <!-- Telefone -->
        <div class="input-group">

          <label for="telefone">
            Telefone
          </label>

          <input
            type="tel"
            id="telefone"
            placeholder="(21) 99999-9999"
            required
          >

        </div>

        <!-- Idade -->
        <div class="input-group">

          <label for="idade">
            Idade
          </label>

          <input
            type="number"
            id="idade"
            placeholder="Sua idade"
            required
          >

        </div>

        <!-- Tipo cabelo -->
        <div class="input-group">

          <label for="cabelo">
            Tipo de cabelo
          </label>

          <input
            type="text"
            id="cabelo"
            placeholder="Ex: Liso, Cacheado, Crespo, Ondulado..."
            required
          >

        </div>

        <!-- Email -->
        <div class="input-group">

          <label for="email">
            Email
          </label>

          <input
            type="email"
            id="email"
            placeholder="Digite seu email"
            required
          >

        </div>

        <!-- Senha -->
        <div class="input-group">

          <label for="senha">
            Senha
          </label>

          <!-- Caixa senha -->
          <div class="senha-box">

            <input
              type="password"
              id="senha"
              placeholder="Digite sua senha"
              required
            >

            <!-- Botão mostrar -->
            <button
              type="button"
              class="mostrar-senha"
              id="mostrarSenha"
            >
              👁
            </button>

          </div>

        </div>

        <!-- Confirmar senha -->
        <div class="input-group">

          <label for="confirmarSenha">
            Confirmar Senha
          </label>

          <input
            type="password"
            id="confirmarSenha"
            placeholder="Digite novamente"
            required
          >

        </div>

        <!-- Botão -->
        <button
          type="submit"
          class="btn-cadastro"
        >
          Cadastrar
        </button>

      </form>

      <!-- Login -->
      <p class="login-link">

        Já possui conta?

        <a href="login.html">
          Fazer Login
        </a>

      </p>

    </div>

  </div>

  <!-- JS -->
  <script src="assets/js/cadastro.js"></script>

</body>

</html>
