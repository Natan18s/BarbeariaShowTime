<!-- Define que o documento usa HTML5 -->
<!DOCTYPE html>
<!-- Início do HTML -->
<!-- lang="pt-BR" informa que o site está em português do Brasil -->
<html lang="pt-BR">

<head>
  <!-- Permite acentos e caracteres especiais -->
  <meta charset="UTF-8">
  <!-- Faz o site funcionar corretamente em celulares -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Nome que aparece na aba do navegador -->
  <title>Barbearia</title>

  <!-- Conecta o arquivo CSS ao HTML -->
  <!-- Sem isso, o CSS não funciona -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- Cabeçalho do site -->
  <!-- Normalmente contém logo, menu e navegação -->
  <header>

    <!-- Nome principal do site -->
    <h1>BarberTime</h1>

    <!-- Menu de navegação -->
    <nav>

      <!-- Links do menu -->
      <!-- # significa link vazio temporário -->
      <a href="#">Início</a>
      <a href="#">Serviços</a>
      <a href="#">Agendar</a>

    </nav>

  </header>

  <!-- Conteúdo principal do site -->
  <main>

    <!-- Seção principal do site -->
    <!-- class="hero" serve para estilizar no CSS -->
    <section class="hero">

      <!-- Título principal -->
      <h2>Seu corte profissional</h2>

      <!-- Texto descritivo -->
      <p>
        Agende seu horário online.
      </p>

      <!-- Botão -->
      <button>
        Agendar Agora
      </button>

    </section>

  </main>

  <!-- Conecta o JavaScript -->
  <!-- Colocado no final para carregar mais rápido -->
  <script src="js/script.js"></script>

</body>
</html>
