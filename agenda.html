<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <!-- CARACTERES -->
  <meta charset="UTF-8">

  <!-- RESPONSIVO -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- TÍTULO -->
  <title>
    Agenda | BarberShowTime
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/agenda.css"
  >

</head>

<body>

  <!-- VOLTAR -->
  <a
    href="index.html"
    class="btn-voltar"
  >
    ← Voltar ao início
  </a>

  <!-- CONTAINER -->
  <div class="container">

    <!-- TÍTULO -->
    <h1>
      Agendamento de Horários
    </h1>

    <!-- TEXTO -->
    <p>
      Escolha uma data e um horário disponível
    </p>

    <!-- ÁREA -->
    <div class="agendamento-box">

      <!-- DATAS -->
      <div class="datas-box">

        <h2>
          Escolha o Dia
        </h2>

        <div
          class="datas"
          id="datas"
        >
        </div>

      </div>

      <!-- HORÁRIOS -->
      <div class="horarios-box">

        <h2>
          Escolha o Horário
        </h2>

        <div
          class="horarios"
          id="horarios"
        >
        </div>

      </div>

    </div>

    <!-- BOTÃO -->
    <button
      id="btnConfirmar"
      class="btn-confirmar"
    >
      Confirmar Agendamento
    </button>

  </div>

  <!-- JS -->
  <script src="assets/js/agenda.js"></script>

</body>

</html>
