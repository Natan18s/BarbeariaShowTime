<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Agenda | BarberShowTime
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/agenda.css"
  >

</head>

<body>

  <!-- Container -->
  <div class="container">

    <!-- Título -->
    <h1>
      Agenda de Horários
    </h1>

    <!-- Texto -->
    <p>
      Escolha um horário disponível
    </p>

    <!-- Agenda -->
    <div class="agenda">

      <!-- Horários -->
      <button class="horario disponivel">
        09:00
      </button>

      <button class="horario ocupado">
        10:00
      </button>

      <button class="horario disponivel">
        11:00
      </button>

      <button class="horario ocupado">
        13:00
      </button>

      <button class="horario disponivel">
        14:00
      </button>

      <button class="horario disponivel">
        15:00
      </button>

      <button class="horario ocupado">
        16:00
      </button>

    </div>

    <!-- Voltar -->
    <a
      href="index.html"
      class="voltar"
    >
      Voltar ao início
    </a>

  </div>

  <!-- JS -->
  <script src="assets/js/agenda.js"></script>

</body>

</html>
